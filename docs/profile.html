<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Keedian — Profile Drill-down</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/styles.css">
<link rel="stylesheet" href="./assets/app.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="./index.html" class="brand">
      <img src="./assets/keedian-logo.png" alt="Keedian" class="brand-logo">
      <span class="brand-divider"></span>
      <span class="brand-context">Market Analysis · Profile</span>
    </a>
    <div class="topbar-meta">
      <a href="./index.html">← Back to matrix</a>
      <span class="brand-divider"></span>
      <a href="./parameters.html">Parameters →</a>
    </div>
  </div>
</header>

<main class="kma-main" id="profile-main">
  <div id="profile-loading" class="lead">Loading profile…</div>

  <article id="profile-content" hidden>
    <header class="page-head">
      <div class="profile-header-row">
        <h1 id="profile-title">—</h1>
        <span id="profile-status-badge" class="badge"></span>
      </div>
      <p class="lead" id="profile-blurb"></p>
      <div class="profile-meta" id="profile-meta"></div>
    </header>

    <section class="profile-section">
      <h2>Inherited from productization</h2>
      <div id="inherited-block" class="inherited-block"></div>
    </section>

    <section class="profile-section">
      <h2>Market analysis</h2>
      <div id="market-block" class="market-block"></div>
    </section>

    <section class="profile-section">
      <h2>Scoring breakdown</h2>
      <div id="scoring-block" class="scoring-block"></div>
    </section>

    <section class="profile-section">
      <h2>AI assistant (mock)</h2>
      <div class="ai-chat">
        <textarea id="ai-prompt" rows="3" placeholder="Ask for improvements or edits to this profile…"></textarea>
        <div class="ai-controls">
          <button id="ai-submit" class="btn-primary">Submit suggestion</button>
          <span id="ai-status" class="status-msg"></span>
        </div>
        <div id="ai-suggestions"></div>
      </div>
    </section>
  </article>
</main>

<div class="footer">
  Profile drill-down · changes to YAML require commit + push · suggestions become GitHub Issues
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script type="module" src="./assets/profile.js"></script>
</body>
</html>
